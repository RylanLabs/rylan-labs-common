---
# GitHub Actions Workflow: Build & Artifact
# Purpose: Build Ansible collection and validate with smoke test
# Trigger: push to main/master
# Domain: Audit (Verification) | Ministry: Verification
# Compliance: Seven Pillars ✓ | 3-Domain ✓ | Production Standards ✓

name: Build & Artifact

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.audit/**'
  workflow_dispatch:

jobs:
  # Job 1: Build collection tarball
  build-collection:
    name: Build Collection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      tarball: ${{ steps.build.outputs.tarball }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ansible-core
        run: |
          pip install --no-cache-dir ansible-core

      - name: Extract version from galaxy.yml
        id: version
        run: |
          VERSION=$(grep "^version:" galaxy.yml | awk '{print $2}')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Build collection
        id: build
        run: |
          echo "Building collection..."
          ansible-galaxy collection build --force --output-path ./build/
          TARBALL=$(ls build/*.tar.gz | head -1)
          TARBALL_NAME=$(basename "$TARBALL")
          echo "tarball=${TARBALL_NAME}" >> $GITHUB_OUTPUT
          [ -f "$TARBALL" ] || (echo "Build failed"; exit 1)
          echo "✓ Collection built"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: collection-build
          path: build/*.tar.gz
          retention-days: 30

  # Job 2: Smoke test
  smoke-test:
    name: Smoke Test
    needs: build-collection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ansible-core
        run: |
          pip install --no-cache-dir ansible-core

      - name: Download collection artifact
        uses: actions/download-artifact@v4
        with:
          name: collection-build
          path: ./artifacts/

      - name: Install and verify collection
        run: |
          TARBALL=$(ls artifacts/*.tar.gz | head -1)
          echo "Installing from: $TARBALL"
          ansible-galaxy collection install "$TARBALL" --force
          ansible-galaxy collection list | grep rylanlab.common
          COLLECTION_PATH=$(find ~/.ansible/collections -type d -name "common" -path "*/rylanlab/*" | head -1)
          [ -d "$COLLECTION_PATH/roles" ] || exit 1
          [ -d "$COLLECTION_PATH/plugins" ] || exit 1
          echo "✓ Collection verified"

  # Summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs:
      - build-collection
      - smoke-test
    if: always()
    steps:
      - run: |
          echo "## ✓ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| build-collection | ${{ needs.build-collection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke-test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build-collection.result }}" = "failure" ] || [ "${{ needs.smoke-test.result }}" = "failure" ]; then exit 1; fi
