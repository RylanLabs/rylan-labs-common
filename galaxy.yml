# Canonical galaxy.yml for RylanLabs Common Collection
# Purpose: Define Ansible Galaxy metadata for reusable infrastructure collection
# Alignment: Seven Pillars (Idempotency, Error Handling, Audit Logging, etc.)
# License: GPL-3.0-or-later

namespace: rylanlab
name: common
version: 1.2.1

readme: README.md  # Primary documentation entry point

authors:  # Attribution per Documentation Clarity pillar
  - RylanLabs <contact@rylanlabs.com>

description: |
  Production-grade Ansible collection for infrastructure automation.
  Includes modular roles for identity, verification, and hardening,
  plus hardened UniFi API modules specializing in UniFi OS 3.x+ CSRF handling.

license:  # Permissive licensing for internal/external reuse
  - GPL-3.0-or-later

tags:  # Descriptive tags for discoverability per Galaxy best practices
  - infrastructure
  - hardening
  - identity
  - verification
  - networking
  - unifi
  - automation
  - security
  - best-practices

dependencies: {}  # No external deps (self-contained per Idempotency pillar)

repository: https://github.com/RylanLabs/rylan-labs-common  # Source repo for traceability
documentation: https://github.com/RylanLabs/rylan-labs-common/blob/main/README.md  # Docs link
homepage: https://github.com/RylanLabs/rylan-labs-common  # Project home
issues: https://github.com/RylanLabs/rylan-labs-common/issues  # Bug tracking & audit trail

# End of Metadata
# Validation: ansible-galaxy collection build --force (pre-publish check)
# No Bypass: This file must pass yaml-lint and semantic validation pre-commit
# Junior-3AM: ansible-galaxy collection install rylanlab.common -p collections/
