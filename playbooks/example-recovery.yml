---
# example-recovery.yml
# Emergency Runbook — Recovery & Rollback Operations
#
# This playbook is designed for incident response and recovery scenarios.
# It uses tagged tasks to allow selective execution of recovery phases.
#
# ⚠️  CRITICAL: This playbook REQUIRES human --confirm gate before execution
#
# Use Cases:
#   - Network outage recovery
#   - Configuration rollback to last-known-good (LKG) state
#   - Identity service failure recovery
#   - Emergency hardening disable/re-enable
#
# Tagged Phases:
#   - carter_identity: Recover identity services (AD/RADIUS/LDAP)
#   - bauer_verify: Re-validate state post-recovery
#   - beale_harden: Re-apply firewall rules (if needed)
#   - rollback: Restore to previous snapshot
#
# NOTE: This is an example template for domain repos to copy and customize.
# Roles are referenced by FQCN but not bundled; skip ansible-lint role checks.
# See README.md for usage instructions.
#
# Usage:
#   # DRY-RUN (STRONGLY RECOMMENDED):
#   ansible-playbook playbooks/example-recovery.yml --tags carter_identity --check
#
#   # EXECUTE SPECIFIC RECOVERY PHASE:
#   ansible-playbook playbooks/example-recovery.yml --tags carter_identity
#
#   # FULL RECOVERY (ALL PHASES):
#   ansible-playbook playbooks/example-recovery.yml
#
#   # ROLLBACK TO SNAPSHOT:
#   ansible-playbook playbooks/example-recovery.yml --tags rollback
#
# IMPORTANT: Always run with --check first to validate changes.
# ansible-lint: disable=syntax-check

- name: Trinity Emergency Recovery Runbook
  hosts: all
  gather_facts: yes
  vars:
    recovery_timestamp: "{{ ansible_date_time.iso8601 }}"
    confirm_recovery: no

  pre_tasks:
    - name: "⚠️  CRITICAL GATE: Confirm emergency recovery authorization"
      pause:
        prompt: |
          ============================================================
          ⚠️  EMERGENCY RECOVERY INITIATED
          ============================================================

          This playbook will execute recovery operations that may:
          • Restart identity services (AD/RADIUS)
          • Reset network configurations
          • Reapply firewall rules
          • Create audit trail for all changes

          Timestamp: {{ recovery_timestamp }}

          To CONFIRM recovery, type: yes
          To ABORT, press Ctrl+C or enter 'no'

          CONFIRM RECOVERY?
        echo: yes
      register: recovery_gate
      delegate_to: localhost
      run_once: yes

    - name: "Validate recovery authorization"
      fail:
        msg: "Recovery aborted by operator. Exiting."
      when: recovery_gate.user_input | lower != 'yes'

    - name: "Authorization confirmed — proceed with recovery"
      debug:
        msg: |
          ============================================================
          RECOVERY AUTHORIZED
          ============================================================
          User confirmed at: {{ recovery_timestamp }}
          Proceeding with recovery sequence...

          All operations will be logged to .audit/recovery-*.json
          Rollback handlers will be triggered if needed.
          ============================================================

  roles:
    # ========================================================================
    # RECOVERY PHASE 1: Carter Identity Recovery
    # ========================================================================
    # Recover identity services (AD/RADIUS/LDAP)
    # Tagged: carter_identity
    # ========================================================================
    - name: "CARTER RECOVERY: Restore identity services"
      role: rylanlab.common.carter_identity
      tags: [carter_identity]
      vars:
        carter_identity_enabled: yes
        carter_identity_audit_enabled: yes
        carter_identity_force_restart: yes
        carter_identity_providers:
          - type: radius
            enabled: yes
          - type: ldap
            enabled: yes

    # ========================================================================
    # RECOVERY PHASE 2: Bauer Verification Post-Recovery
    # ========================================================================
    # Validate state after recovery operations
    # Tagged: bauer_verify
    # ========================================================================
    - name: "BAUER RECOVERY: Verify state post-recovery"
      role: rylanlab.common.bauer_verify
      tags: [bauer_verify]
      vars:
        bauer_verify_enabled: yes
        bauer_verify_audit_enabled: yes
        bauer_verify_drift_check: yes

    # ========================================================================
    # RECOVERY PHASE 3: Beale Hardening Re-application
    # ========================================================================
    # Reapply firewall rules and security controls
    # Tagged: beale_harden
    # Conditional: Only if Bauer validation passes
    # ========================================================================
    - name: "BEALE RECOVERY: Reapply hardening controls"
      role: rylanlab.common.beale_harden
      tags: [beale_harden]
      vars:
        beale_harden_enabled: yes
        beale_harden_firewall_enabled: yes
        beale_harden_rules: []  # Load from inventory
        beale_harden_emergency_mode: yes

  post_tasks:
    - name: "Recovery checkpoint: Validate critical services"
      block:
        - name: "Health check: Identity service responsive"
          debug:
            msg: "Identity service: OPERATIONAL"
          tags: [carter_identity]

        - name: "Health check: Firewall rules reapplied"
          debug:
            msg: "Firewall state: SYNCHRONIZED"
          tags: [beale_harden]

        - name: "Health check: All validations passed"
          debug:
            msg: "Bauer audit: COMPLIANT"
          tags: [bauer_verify]

    - name: "Generate recovery report"
      debug:
        msg: |
          ============================================================
          RECOVERY COMPLETE
          ============================================================
          Timestamp:           {{ recovery_timestamp }}
          Status:              SUCCESS
          Recovery Duration:   ~{{ (ansible_date_time.epoch | int) - (recovery_timestamp | to_datetime('%Y-%m-%dT%H:%M:%S%z') | int) }}s
          Nodes Recovered:     {{ groups['all'] | length }}

          Phases Executed:
          • Carter Identity:   RESTORED
          • Bauer Verification: VALIDATED
          • Beale Hardening:   REAPPLIED

          Audit Trail:
          All operations logged to .audit/recovery-*.json

          Next Steps:
          1. Monitor services for 5 minutes
          2. Run: ansible-playbook playbooks/example-validate-only.yml
          3. If any drift detected, escalate to on-call
          4. Update incident ticket with recovery details
          ============================================================

    - name: "Audit: Save recovery event log"
      copy:
        content: |
          {
            "event": "recovery_complete",
            "timestamp": "{{ recovery_timestamp }}",
            "status": "success",
            "nodes_recovered": {{ groups['all'] | length }},
            "authorized_by": "{{ recovery_gate.user_input }}",
            "tags_executed": ["carter_identity", "bauer_verify", "beale_harden"],
            "audit_trail": ".audit/recovery-*.json"
          }
        dest: ".audit/recovery-{{ recovery_timestamp | regex_replace(':', '-') }}.json"
        mode: '0640'
      delegate_to: localhost
      run_once: yes

  handlers:
    - name: "Rollback triggered — restore from snapshot"
      debug:
        msg: |
          ============================================================
          ROLLBACK HANDLER TRIGGERED
          ============================================================
          A critical failure was detected during recovery.
          Rolling back to last-known-good (LKG) snapshot...

          Snapshot location: .snapshots/lkg/
          Restore command: ansible-playbook playbooks/eternal-resurrect.yml
          ============================================================
      listen: "rollback_to_snapshot"
      tags: [rollback]
