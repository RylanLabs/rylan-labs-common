---
# example-bootstrap.yml
# Infrastructure Bootstrap Example — Full End-to-End Orchestration
#
# This playbook demonstrates the recommended boot sequence:
# Identity → Verification → Hardening
#
# Estimated Execution Time: 8-12 minutes for a standard environment
# Modes: Supports --check for dry-run validation
#
# Usage:
#   # Dry-run:
#   ansible-playbook playbooks/example-bootstrap.yml --check
#
#   # Execute:
#   ansible-playbook playbooks/example-bootstrap.yml

- name: Infrastructure Bootstrap Example
  hosts: all
  gather_facts: yes
  vars:
    bootstrap_timestamp: "{{ ansible_date_time.iso8601 }}"

  pre_tasks:
    - name: Pre-flight validation
      ansible.builtin.debug:
        msg: |
          Bootstrap sequence initiating...
          Timestamp: {{ bootstrap_timestamp }}
          Target nodes: {{ groups['all'] | length }}
          Mode: {% if ansible_check_mode %}CHECK (dry-run){% else %}EXECUTE{% endif %}

    - name: Pre-bootstrap verification
      ansible.builtin.include_role:
        name: rylanlab.common.infrastructure_verify
        tasks_from: main.yml
      vars:
        infrastructure_verify_enabled: yes
        infrastructure_verify_audit_enabled: yes

  roles:
    # ============================================================================
    # PHASE 1: Identity Management
    # ============================================================================
    - name: Establish identity fabric
      role: rylanlab.common.identity_management
      vars:
        identity_management_enabled: yes
        identity_management_audit_enabled: yes
        identity_providers:
          - type: radius
            enabled: yes
          - type: ldap
            enabled: yes

    # ============================================================================
    # PHASE 2: Verification and Audit
    # ============================================================================
    - name: Verify configuration state
      role: rylanlab.common.infrastructure_verify
      vars:
        infrastructure_verify_enabled: yes
        infrastructure_verify_audit_enabled: yes
        infrastructure_loki_endpoint: "{{ loki_endpoint | default('') }}"
        infrastructure_log_retention_days: 90

    # ============================================================================
    # PHASE 3: Infrastructure Hardening
    # ============================================================================
    - name: Harden infrastructure and apply security controls
      role: rylanlab.common.hardening_management
      vars:
        hardening_management_enabled: yes
        firewall_rules: []  # Load from group_vars/host_vars
        vlan_configs: []

  post_tasks:
    - name: Generate bootstrap summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          BOOTSTRAP COMPLETE
          ============================================================
          Timestamp:    {{ bootstrap_timestamp }}
          Status:       SUCCESS
          Nodes:        {{ groups['all'] | length }}

          Phases Completed:
          ✓ Identity Management
          ✓ Infrastructure Verification
          ✓ Infrastructure Hardening

          Next Steps:
          1. Verify audit logs in .audit/bootstrap/ directory
          2. Run validation checks
          ============================================================

    - name: Log bootstrap event to audit trail
      ansible.builtin.copy:
        content: |
          {
            "event": "bootstrap_complete",
            "timestamp": "{{ bootstrap_timestamp }}",
            "status": "success",
            "nodes": {{ groups['all'] | length }},
            "mode": "{% if ansible_check_mode %}check{% else %}execute{% endif %}"
          }
        dest: ".audit/bootstrap-{{ bootstrap_timestamp | regex_replace(':', '-') }}.json"
        mode: '0640'
      delegate_to: localhost
      run_once: yes
