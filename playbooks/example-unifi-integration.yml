---
# example-unifi-integration.yml
# UniFi Dynamic Inventory + API Integration Demo
#
# This playbook demonstrates the flagship UniFi features:
# - Dynamic inventory plugin (auto-discover devices from controller)
# - UniFi API module (query topology, WLAN config, client data)
# - Beale hardening applied to discovered devices
#
# Prerequisites:
#   - unifi_dynamic_inventory plugin configured in ansible.cfg
#   - UniFi controller credentials in group_vars/unifi_devices/
#   - Network connectivity to UniFi controller
#
# NOTE: This is an example template for domain repos to copy and customize.
# Roles are referenced by FQCN but not bundled; skip ansible-lint role checks.
# See README.md for usage instructions.
#
# Usage:
#   # List discovered devices (dry-run):
#   ansible-inventory --inventory inventory/unifi_inventory.yml --list
#
#   # Execute playbook:
#   ansible-playbook playbooks/example-unifi-integration.yml
#
#   # Target specific device type:
#   ansible-playbook playbooks/example-unifi-integration.yml --limit "tag_device_type_switch"
# ansible-lint: disable=syntax-check

- name: UniFi Integration Example — Dynamic Inventory & API
  hosts: unifi_devices
  gather_facts: yes
  vars:
    query_timestamp: "{{ ansible_date_time.iso8601 }}"

  pre_tasks:
    - name: "Validate UniFi connectivity"
      debug:
        msg: |
          UniFi Discovery Initiating...
          Controller: {{ unifi_controller | default('N/A') }}
          Timestamp:  {{ query_timestamp }}
          Devices:    {{ groups['unifi_devices'] | default([]) | length }}

  tasks:
    # ========================================================================
    # TASK 1: Query UniFi Topology via API Module
    # ========================================================================
    - name: "UniFi API: Query device topology"
      rylanlabs.common.unifi_api:
        endpoint: /api/s/default/stat/device
        method: GET
      register: unifi_devices_raw
      vars:
        unifi_controller: "{{ hostvars['unifi_controller']['controller_url'] | default('https://unifi.example.com:8443') }}"
        unifi_username: "{{ vault_unifi_username }}"
        unifi_password: "{{ vault_unifi_password }}"

    - name: "UniFi API: Debug discovered devices"
      debug:
        var: unifi_devices_raw
      when: debug | default(no)

    # ========================================================================
    # TASK 2: Query WLAN Configuration
    # ========================================================================
    - name: "UniFi API: Query WLAN networks"
      rylanlabs.common.unifi_api:
        endpoint: /api/s/default/rest/wlanconf
        method: GET
      register: unifi_wlans
      run_once: yes
      vars:
        unifi_controller: "{{ hostvars['unifi_controller']['controller_url'] | default('https://unifi.example.com:8443') }}"
        unifi_username: "{{ vault_unifi_username }}"
        unifi_password: "{{ vault_unifi_password }}"

    - name: "UniFi API: Debug WLANs"
      debug:
        msg: "Discovered WLANs: {{ unifi_wlans.data | map(attribute='name') | list }}"
      run_once: yes
      when: debug | default(no)

    # ========================================================================
    # TASK 3: Query Connected Clients
    # ========================================================================
    - name: "UniFi API: Query connected clients"
      rylanlabs.common.unifi_api:
        endpoint: /api/s/default/stat/sta
        method: GET
      register: unifi_clients
      run_once: yes
      vars:
        unifi_controller: "{{ hostvars['unifi_controller']['controller_url'] | default('https://unifi.example.com:8443') }}"
        unifi_username: "{{ vault_unifi_username }}"
        unifi_password: "{{ vault_unifi_password }}"

    - name: "UniFi API: Summarize client count"
      debug:
        msg: |
          Connected Clients: {{ unifi_clients.data | length }}
          Network Utilization: Ready for analysis
      run_once: yes
      when: debug | default(no)

  roles:
    # ========================================================================
    # ROLE 1: Beale Hardening Applied to Discovered Devices
    # ========================================================================
    # Apply firewall rules and security policies to all discovered devices
    # Constraint: Max 10 firewall rules per device
    # ========================================================================
    - name: "BEALE: Harden discovered UniFi devices"
      role: rylanlabs.common.beale_harden
      vars:
        beale_harden_enabled: yes
        beale_harden_firewall_enabled: yes
        beale_harden_rules: []  # Load from inventory
        beale_harden_nmap_validation: no

  post_tasks:
    - name: "Log UniFi integration event"
      debug:
        msg: |
          ============================================================
          UNIFI INTEGRATION COMPLETE
          ============================================================
          Timestamp:          {{ query_timestamp }}
          Devices Discovered: {{ groups['unifi_devices'] | length }}
          WLANs:              {{ unifi_wlans.data | length | default('N/A') }}
          Connected Clients:  {{ unifi_clients.data | length | default('N/A') }}

          Topology Summary:
          {{ unifi_devices_raw | to_nice_json }}

          Next Steps:
          1. Review discovered inventory: ansible-inventory --list
          2. Tag devices: ansible.builtin.set_fact (add custom tags)
          3. Apply policies: beale_harden with device-specific rules
          ============================================================
      run_once: yes

    - name: "Audit: Save UniFi topology snapshot"
      copy:
        content: |
          {
            "timestamp": "{{ query_timestamp }}",
            "devices": {{ unifi_devices_raw | to_json }},
            "wlans": {{ unifi_wlans | to_json }},
            "clients": {{ unifi_clients | to_json }}
          }
        dest: ".audit/unifi-topology-{{ query_timestamp | regex_replace(':', '-') }}.json"
        mode: '0640'
      delegate_to: localhost
      run_once: yes
