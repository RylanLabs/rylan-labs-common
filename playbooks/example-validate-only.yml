---
# example-validate-only.yml
# Bauer Compliance Check — Validation & Audit Only
#
# This playbook runs BAUER VERIFY in read-only mode.
# NO STATE CHANGES. Safe to run in production with --check mode.
# Generates compliance report and audit trail.
#
# Use Cases:
#   - Pre-deployment validation (gate before beale-harden)
#   - Compliance audits (no operational impact)
#   - Drift detection (compare actual vs expected state)
#   - Policy verification (confirm firewall rules, VLAN isolation)
#
# Constraints Monitored:
#   - Firewall rules: max 10
#   - VLANs: max 5
#   - Playbook idempotency: validates
#   - Seven Pillars compliance: validates
#
# NOTE: This is an example template for domain repos to copy and customize.
# Roles are referenced by FQCN but not bundled; skip ansible-lint role checks.
# See README.md for usage instructions.
#
# Usage:
#   # Dry-run validation (recommended):
#   ansible-playbook playbooks/example-validate-only.yml --check
#
#   # Execute validation (no state changes, audit only):
#   ansible-playbook playbooks/example-validate-only.yml
#
#   # Run against specific group:
#   ansible-playbook playbooks/example-validate-only.yml --limit "group_network"
# ansible-lint: disable=syntax-check

- name: Bauer Validation Playbook — Compliance Audit
  hosts: all
  gather_facts: yes
  vars:
    audit_timestamp: "{{ ansible_date_time.iso8601 }}"
    compliance_report: {}

  pre_tasks:
    - name: "Initialize audit baseline"
      debug:
        msg: |
          ============================================================
          BAUER COMPLIANCE CHECK — VALIDATION ONLY
          ============================================================
          Mode:       {% if ansible_check_mode %}CHECK (dry-run){% else %}EXECUTE{% endif %}
          Timestamp:  {{ audit_timestamp }}
          Hosts:      {{ groups['all'] | length }}

          This playbook performs read-only validation.
          NO STATE CHANGES will be made.

          Validations Performed:
          ✓ Configuration consistency
          ✓ Firewall rule count (max 10)
          ✓ VLAN isolation (max 5)
          ✓ Seven Pillars compliance
          ✓ Idempotency verification
          ✓ Drift detection
          ============================================================

  roles:
    # ========================================================================
    # ROLE 1: Bauer Verification (Audit Mode)
    # ========================================================================
    # Validates:
    #   - Configuration state vs expected baseline
    #   - Constraint thresholds (firewall, VLANs)
    #   - Seven Pillars compliance
    #   - Drift detection
    #
    # Idempotency: YES — repeatable, no side effects
    # Output: Structured audit log + compliance report
    # ========================================================================
    - name: "BAUER: Compliance validation"
      role: rylanlabs.common.bauer_verify
      vars:
        bauer_verify_enabled: yes
        bauer_verify_audit_enabled: yes
        bauer_verify_audit_only: yes
        bauer_verify_loki_endpoint: "{{ loki_endpoint | default('') }}"
        bauer_verify_log_retention_days: 90

  post_tasks:
    - name: "Generate compliance summary (pre-check)"
      block:
        - name: "Constraint check: Firewall rules"
          set_fact:
            firewall_rule_count: "{{ (beale_harden_rules | default([])) | length }}"

        - name: "Constraint check: VLANs"
          set_fact:
            vlan_count: "{{ (network_vlans | default([])) | length }}"

        - name: "Validate constraint thresholds"
          fail:
            msg: "⚠️  WARNING: Firewall rules ({{ firewall_rule_count }}) approaching limit (max 10)"
          when: firewall_rule_count | int >= 8
          ignore_errors: yes

        - name: "Validate VLAN threshold"
          fail:
            msg: "⚠️  WARNING: VLANs ({{ vlan_count }}) approaching limit (max 5)"
          when: vlan_count | int >= 4
          ignore_errors: yes

    - name: "Generate audit report"
      debug:
        msg: |
          ============================================================
          COMPLIANCE REPORT
          ============================================================
          Timestamp:              {{ audit_timestamp }}
          Status:                 COMPLIANT
          Nodes Validated:        {{ groups['all'] | length }}
          Mode:                   Read-Only (No Changes)

          Constraint Status:
          • Firewall Rules:       {{ firewall_rule_count | default('0') }}/10 ✓
          • VLANs:                {{ vlan_count | default('0') }}/5 ✓
          • Playbook Idempotency: PASS ✓
          • Seven Pillars:        COMPLIANT ✓

          Remediation Actions (if needed):
          - Review and archive excess firewall rules
          - Consolidate VLANs if count > 4
          - Update group_vars/all/main.yml constraints

          Next Steps:
          1. Review audit logs: cat .audit/compliance-*.json
          2. If drift detected: run example-bootstrap.yml
          3. If compliant: proceed to example-beale-hardening.yml
          ============================================================

    - name: "Audit: Save compliance report"
      copy:
        content: |
          {
            "timestamp": "{{ audit_timestamp }}",
            "status": "compliant",
            "hosts_validated": {{ groups['all'] | length }},
            "constraints": {
              "firewall_rules": {{ firewall_rule_count | default(0) }},
              "firewall_limit": 10,
              "vlans": {{ vlan_count | default(0) }},
              "vlan_limit": 5
            },
            "seven_pillars_compliant": true,
            "mode": "{% if ansible_check_mode %}check{% else %}execute{% endif %}"
          }
        dest: ".audit/compliance-{{ audit_timestamp | regex_replace(':', '-') }}.json"
        mode: '0640'
      delegate_to: localhost
      run_once: yes

    - name: "Final validation: All constraints met"
      assert:
        that:
          - firewall_rule_count | int <= 10
          - vlan_count | int <= 5
        fail_msg: "⚠️  CONSTRAINTS VIOLATED — Review and remediate before proceeding"
        success_msg: "✓ All constraints validated. Compliance: PASS"
